spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/codeturret
    username: ${DB_USER:codeturret}
    password: ${DB_PASSWORD:codeturret}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    listener:
      simple:
        acknowledge-mode: auto
        retry:
          enabled: true
          max-attempts: 3

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com/v1beta
  model:
    flash: gemini-2.0-flash
    pro: gemini-2.5-pro
  timeout-seconds: 60
  max-retries: 2
  rate-limit-delay-ms: 7000
  deep-scan-threshold: 0.7

github:
  api-url: https://api.github.com

git:
  clone-depth: 50
  max-commits: 50
  max-scan-files: 25
  max-file-size: 50000

snowflake:
  account: ${SNOWFLAKE_ACCOUNT:}
  user: ${SNOWFLAKE_USER:}
  password: ${SNOWFLAKE_PASSWORD:}
  warehouse: ${SNOWFLAKE_WAREHOUSE:CODEBOUNCER_WH}
  database: ${SNOWFLAKE_DATABASE:CODEBOUNCER}
  schema: ${SNOWFLAKE_SCHEMA:CORE}
  cortex-model: llama3.1-8b

encryption:
  secret-key: ${ENCRYPTION_SECRET_KEY:dev-key-change-in-production-32b}

server:
  port: 8080

logging:
  level:
    com.codeturret: INFO
